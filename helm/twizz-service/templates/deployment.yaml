apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "twizz-service.fullname" . }}
  labels:
    {{- include "twizz-service.labels" . | nindent 4 }}
  {{- if .Values.ttl }}
  annotations:
    twizz-idp/ttl: {{ .Values.ttl | quote }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "twizz-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "twizz-service.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            {{- if .Values.env }}
            - configMapRef:
                name: {{ include "twizz-service.fullname" . }}
            {{- end }}
            {{- if .Values.externalSecret.enabled }}
            - secretRef:
                name: {{ include "twizz-service.fullname" . }}-secrets
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
