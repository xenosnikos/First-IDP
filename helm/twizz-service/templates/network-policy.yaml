{{- if .Values.namespace.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "twizz-service.fullname" . }}-isolation
spec:
  podSelector:
    matchLabels:
      {{- include "twizz-service.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    - from:
        - podSelector: {}
  egress:
    - {}
{{- end }}
